<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
  --font:"Inter",system-ui,-apple-system,sans-serif;
  --fz-xs:10px;--fz-sm:11px;--fz-base:12px;--fz-md:13px;--fz-lg:14px;
    --bg:#F0F4FF; --surface:#fff; --surface2:#EBF0FF; --surface3:#DCE5FF;
    --border:rgba(0,60,200,0.08); --border-md:rgba(0,60,200,0.13);
    --text:#0A0F2E; --text-2:#3A4270; --text-3:#7A84B0;
    --accent:#0057FF; --accent-2:rgba(0,87,255,0.10);
    --navy:#0A0F2E; --navy-2:#131830; --navy-3:#1D2440;
    --g-fg:#006B47; --g-bg:#E6F5EE;
    --l-fg:#004FCC; --l-bg:#E8EFFF;
    --r-fg:#7A4800; --r-bg:#FFF2DC;
    --b-fg:#B81518; --b-bg:#FFE8E8;
    --n-fg:#44496A; --n-bg:#EAECF1;
    --r:5px; --r-md:7px; --r-lg:10px; --r-xl:14px;
    --sh-sm:0 1px 3px rgba(10,15,35,0.06),0 1px 2px rgba(10,15,35,0.04);
    --sh-md:0 4px 16px rgba(10,15,35,0.08),0 2px 6px rgba(10,15,35,0.05);
  }
  body { font-family:var(--font, 'Inter', system-ui, sans-serif); font-size:13px; line-height:1.5; -webkit-font-smoothing:antialiased; }

  .page-header {
    background:var(--navy); color:#fff; padding:0 1.25rem; display:flex;
    align-items:center; justify-content:space-between; height:44px;
    position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.05);
  
    font-family:var(--font,"Inter",system-ui,sans-serif); font-size:13px;}
  .page-header .logo { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,0.9); display:flex; align-items:center; gap:8px; }
  .logo-icon { width:18px; height:18px; background:var(--accent); border-radius:4px; display:flex; align-items:center; justify-content:center; }
  .btn-back-detail { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:3px 9px; border-radius:var(--r); border:1px solid rgba(255,255,255,0.10); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .12s; }
  .btn-back-detail:hover { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.8); }

  .main { max-width:1200px; margin:0 auto; padding:1.25rem 1.5rem 3rem; }

  h2 { font-size:18px; font-weight:500; color:var(--text); margin-bottom:1rem; }

  /* KPI CARDS */
  .kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:1.5rem; }
  .kpi-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    padding:1rem 1.125rem; position:relative; overflow:hidden; box-shadow:var(--sh-sm);
  }
  .kpi-bar { position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--border-md); border-radius:var(--r-lg) 0 0 var(--r-lg); }
  .kpi-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3); margin-bottom:6px; }
  .kpi-number { font-size:28px; font-weight:300; font-family:'DM Mono',monospace; line-height:1; color:var(--text); }
  .kpi-sub { font-size:10px; color:var(--text-3); margin-top:4px; }
  .kpi-card.k-gereed .kpi-bar,.kpi-card.k-gereed .kpi-number { background:var(--g-fg); color:var(--g-fg); }
  .kpi-card.k-loopt  .kpi-bar,.kpi-card.k-loopt  .kpi-number { background:var(--l-fg); color:var(--l-fg); }
  .kpi-card.k-review .kpi-bar,.kpi-card.k-review .kpi-number { background:var(--r-fg); color:var(--r-fg); }
  .kpi-card.k-geblokkeerd .kpi-bar,.kpi-card.k-geblokkeerd .kpi-number { background:var(--b-fg); color:var(--b-fg); }

  /* PROGRESS BARS */
  .section-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem 1.5rem; margin-bottom:1rem; box-shadow:var(--sh-sm); }
  .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3); margin-bottom:1rem; }
  .bar-row { display:flex; align-items:center; gap:.75rem; margin-bottom:.625rem; }
  .bar-label { font-size:12px; color:var(--text-2); width:160px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-track { flex:1; height:12px; background:var(--surface2); border-radius:6px; overflow:hidden; position:relative; }
  .bar-fill { height:100%; border-radius:6px; transition:width .4s ease; }
  .bar-fill.g { background:var(--g-fg); }
  .bar-fill.l { background:var(--l-fg); }
  .bar-fill.r { background:var(--r-fg); }
  .bar-fill.b { background:var(--b-fg); }
  .bar-fill.n { background:var(--n-fg); }
  .bar-val { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-2); width:40px; text-align:right; flex-shrink:0; }
  .bar-pct { font-size:10px; color:var(--text-3); width:36px; text-align:right; flex-shrink:0; }

  /* STATUS BREAKDOWN STACKED BAR */
  .stacked-row { display:flex; align-items:center; gap:.75rem; margin-bottom:.625rem; }
  .stacked-label { font-size:11px; color:var(--text-2); width:130px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stacked-bar { flex:1; height:14px; border-radius:6px; overflow:hidden; display:flex; }
  .stacked-seg { height:100%; transition:width .4s ease; }
  .stacked-count { font-size:10px; font-family:'DM Mono',monospace; color:var(--text-3); width:30px; text-align:right; flex-shrink:0; }

  /* ENGINEER TABLE */
  .eng-table { width:100%; border-collapse:collapse; font-size:12px; }
  .eng-table th { padding:6px 10px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); border-bottom:1px solid var(--border-md); }
  .eng-table td { padding:7px 10px; border-bottom:1px solid var(--border); color:var(--text-2); }
  .eng-table tr:last-child td { border-bottom:none; }
  .eng-table td:first-child { font-weight:500; color:var(--text); }
  .pct-badge { display:inline-block; padding:1px 7px; border-radius:20px; font-size:10px; font-weight:700; }

  .spinner { width:24px; height:24px; border:2px solid var(--border-md); border-top-color:var(--accent); border-radius:50%; animation:spin .55s linear infinite; margin:2rem auto; }
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:768px){ .kpi-grid{grid-template-columns:repeat(2,1fr);} }

  /* ══ SIDEBAR ══ */
  :root { --sb-w:220px; --sb-w-col:52px; --hdr-h:48px; }
  .app-layout {
    padding-left:var(--sb-w);
    transition:padding-left .22s cubic-bezier(.4,0,.2,1);
    min-height:calc(100vh - var(--hdr-h));
    display:flex; flex-direction:column; align-items:center;
  }
  .sidebar-collapsed-state .app-layout { padding-left:var(--sb-w-col); }
  .app-layout > * { width:100%; }

  .sidebar {
    width:var(--sb-w); flex-shrink:0;
    background:#0A0F2E; color:#fff;
    position:fixed; top:var(--hdr-h); left:0;
    height:calc(100vh - var(--hdr-h)); z-index:90;
    display:flex; flex-direction:column;
    transition:width .22s cubic-bezier(.4,0,.2,1);
    overflow:hidden; border-right:1px solid rgba(255,255,255,0.07);
  }
  .sidebar.collapsed { width:var(--sb-w-col); }
  .sidebar-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.12) transparent; }
  .sidebar-content::-webkit-scrollbar { width:3px; }
  .sidebar-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:2px; }

  .sb-toggle {
    position:fixed; top:calc(var(--hdr-h) + .75rem); left:calc(var(--sb-w) - 14px);
    width:28px; height:28px; border-radius:50%;
    background:var(--surface); border:1px solid var(--border-md);
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:91;
    transition:left .22s cubic-bezier(.4,0,.2,1), opacity .15s, transform .15s;
    color:var(--text-2); font-size:12px;
    opacity:0; transform:scale(.85); pointer-events:none;
  }
  .sidebar:hover ~ .sb-toggle, .sb-toggle:hover { opacity:1; transform:scale(1); pointer-events:all; }
  .sb-toggle:hover { background:var(--surface2); color:var(--text); }
  .sidebar.collapsed ~ .sb-toggle { left:calc(var(--sb-w-col) - 14px); opacity:1; transform:scale(1); pointer-events:all; }

  .sb-section-label {
    font-size:8.5px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
    color:rgba(255,255,255,.3); padding:.875rem 1rem .25rem;
    white-space:nowrap; overflow:hidden; transition:opacity .15s;
  }
  .sidebar.collapsed .sb-section-label { opacity:0; }

  .sb-item {
    display:flex; align-items:center; gap:.625rem;
    padding:.5rem 1rem; font-size:12px; font-weight:500;
    color:rgba(255,255,255,.6); cursor:pointer;
    border-left:3px solid transparent;
    transition:all .1s; white-space:nowrap; overflow:hidden;
    border:none; background:none; width:100%; text-align:left; font-family:inherit;
  }
  .sb-item:hover { background:rgba(255,255,255,.07); color:#fff; }
  .sb-item.active { background:rgba(255,255,255,.1); color:#fff; border-left-color:#0057FF; }
  .sb-item .sb-icon {
    width:32px; height:32px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:14px; transition:background .1s;
  }
  .sb-item:hover .sb-icon { background:rgba(255,255,255,.08); }
  .sb-item.active .sb-icon { background:rgba(0,87,255,.35); }
  .sb-item .sb-label { flex:1; overflow:hidden; text-overflow:ellipsis; transition:opacity .15s, width .22s; }
  .sidebar.collapsed .sb-label { opacity:0; width:0; }

  .sb-divider { height:1px; background:rgba(255,255,255,.07); margin:.5rem 1rem; }

  /* Header shifts with sidebar */
  .page-header {
    padding-left:calc(var(--sb-w) + 1rem) !important;
    transition:padding-left .22s cubic-bezier(.4,0,.2,1);
  }
  .sidebar-collapsed-state .page-header {
    padding-left:calc(var(--sb-w-col) + 1rem) !important;
  }
  .has-sidebar .logo { display:none !important; }

  /* Mobile */
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.mobile-open { transform:translateX(0); }
    .app-layout { padding-left:0 !important; }
    .page-header { padding-left:1rem !important; }
    .sb-toggle { display:none; }
  }


  /* ── Sidebar resize ── */
  .sidebar-resize-handle {
    position:absolute; right:0; top:0; bottom:0; width:5px;
    cursor:col-resize; z-index:10; background:transparent;
    transition:background .15s;
  }
  .sidebar-resize-handle:hover, .sidebar.resizing .sidebar-resize-handle {
    background:var(--accent);
  }
  .sidebar-resize-grip {
    position:absolute; right:-8px; top:50%; transform:translateY(-50%);
    width:16px; height:32px; background:var(--surface);
    border:1px solid var(--border-md); border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; cursor:col-resize; z-index:92; box-shadow:0 2px 8px rgba(0,0,0,.1);
    transition:opacity .15s, background .1s;
    opacity:0;
  }
  .sidebar:hover .sidebar-resize-grip,
  .sidebar.resizing .sidebar-resize-grip { opacity:1; }
  .sidebar-resize-grip span {
    width:2px; height:2px; background:var(--text-3); border-radius:50%;
  }
  .sidebar.collapsed .sidebar-resize-handle,
  .sidebar.collapsed .sidebar-resize-grip { display:none; }

</style>
</head>

function supaGet(path) {
  return fetch(SUPA_URL + path, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  }).then(function(r) { return r.json(); });
}

function esc(v) {
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.addEventListener('load', function() {
  supaGet('/rest/v1/werkpakketten?select=engineer,cel_data&order=row_idx.asc')
    .then(function(data) {
      renderAnalyse(data);
    })
    .catch(function(e) {
      document.getElementById('mainContent').innerHTML = '<p style="color:#b53030;padding:2rem">Laden mislukt: ' + esc(e.message) + '</p>';
    });
});

function getStatusCounts(rows, cols) {
  var counts = { 'Gereed':0, 'Loopt':0, 'Review':0, 'Geblokkeerd':0, 'Nog te starten':0, 'Leeg':0 };
  rows.forEach(function(row) {
    var cd = row.cel_data || {};
    cols.forEach(function(ci) {
      var v = cd[String(ci)] || '';
      if (counts[v] !== undefined) counts[v]++;
      else counts['Leeg']++;
    });
  });
  return counts;
}

function statusColor(s) {
  if (s==='Gereed')        return 'var(--g-fg)';
  if (s==='Loopt')         return 'var(--l-fg)';
  if (s==='Review')        return 'var(--r-fg)';
  if (s==='Geblokkeerd')   return 'var(--b-fg)';
  if (s==='Nog te starten') return 'var(--n-fg)';
  return 'var(--border-md)';
}

function renderAnalyse(data) {
  var n = data.length;
  if (!n) { document.getElementById('mainContent').innerHTML = '<p style="padding:2rem;color:var(--text-3)">Geen data gevonden.</p>'; return; }

  // ── Overall status counts ──
  var total = getStatusCounts(data, STATUS_COLS);
  var totalTasks = STATUS_COLS.length * n;
  var g = total['Gereed'], l = total['Loopt'], rv = total['Review'], gb = total['Geblokkeerd'], nt = total['Nog te starten'];

  var html = '';

  // KPI cards
  html += '<div class="kpi-grid">';
  html += '<div class="kpi-card"><div class="kpi-bar"></div><div class="kpi-label">Werkpakketten</div><div class="kpi-number">'+n+'</div><div class="kpi-sub">totaal</div></div>';
  html += '<div class="kpi-card k-gereed"><div class="kpi-bar"></div><div class="kpi-label">Gereed</div><div class="kpi-number">'+g+'</div><div class="kpi-sub">taken</div></div>';
  html += '<div class="kpi-card k-loopt"><div class="kpi-bar"></div><div class="kpi-label">Loopt</div><div class="kpi-number">'+l+'</div><div class="kpi-sub">taken</div></div>';
  html += '<div class="kpi-card k-review"><div class="kpi-bar"></div><div class="kpi-label">Review</div><div class="kpi-number">'+rv+'</div><div class="kpi-sub">taken</div></div>';
  html += '<div class="kpi-card k-geblokkeerd"><div class="kpi-bar"></div><div class="kpi-label">Geblokkeerd</div><div class="kpi-number">'+gb+'</div><div class="kpi-sub">taken</div></div>';
  html += '</div>';

  // ── Voortgang per fase ──
  html += '<div class="section-card"><div class="section-title">Voortgang per fase</div>';
  Object.keys(FASE_STATUS_COLS).forEach(function(fase) {
    var cols = FASE_STATUS_COLS[fase];
    var counts = getStatusCounts(data, cols);
    var tot = cols.length * n;
    if (!tot) return;
    var pct = Math.round(counts['Gereed'] / tot * 100);
    html += '<div class="bar-row">';
    html += '<div class="bar-label" title="'+esc(fase)+'">'+esc(fase)+'</div>';
    html += '<div class="bar-track"><div class="bar-fill g" style="width:'+pct+'%"></div></div>';
    html += '<div class="bar-val">'+counts['Gereed']+'/'+tot+'</div>';
    html += '<div class="bar-pct">'+pct+'%</div>';
    html += '</div>';
  });
  html += '</div>';

  // ── Status verdeling per fase (stacked bar) ──
  html += '<div class="section-card"><div class="section-title">Statusverdeling per fase</div>';
  var statuses = ['Gereed','Loopt','Review','Geblokkeerd','Nog te starten'];
  Object.keys(FASE_STATUS_COLS).forEach(function(fase) {
    var cols = FASE_STATUS_COLS[fase];
    var counts = getStatusCounts(data, cols);
    var tot = cols.length * n;
    if (!tot) return;
    html += '<div class="stacked-row">';
    html += '<div class="stacked-label" title="'+esc(fase)+'">'+esc(fase)+'</div>';
    html += '<div class="stacked-bar">';
    statuses.forEach(function(s) {
      var pct = tot > 0 ? (counts[s]/tot*100) : 0;
      if (pct > 0) html += '<div class="stacked-seg" style="width:'+pct+'%;background:'+statusColor(s)+'" title="'+esc(s)+': '+counts[s]+'"></div>';
    });
    html += '</div>';
    html += '<div class="stacked-count">'+tot+'</div>';
    html += '</div>';
  });
  // Legend
  html += '<div style="display:flex;gap:12px;margin-top:.75rem;flex-wrap:wrap">';
  statuses.forEach(function(s) {
    html += '<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-2)">'
      + '<span style="width:8px;height:8px;border-radius:2px;background:'+statusColor(s)+';display:inline-block"></span>'+esc(s)+'</span>';
  });
  html += '</div></div>';

  // ── Per engineer ──
  html += '<div class="section-card"><div class="section-title">Voortgang per engineer</div>';
  var byEng = {};
  data.forEach(function(row) {
    var eng = (row.cel_data && row.cel_data['8']) || 'Onbekend';
    if (!byEng[eng]) byEng[eng] = [];
    byEng[eng].push(row);
  });
  html += '<table class="eng-table"><thead><tr><th>Engineer</th><th>Projecten</th><th>Gereed</th><th>Loopt</th><th>Review</th><th>Geblokkeerd</th><th>% Gereed</th></tr></thead><tbody>';
  Object.keys(byEng).sort().forEach(function(eng) {
    var rows = byEng[eng];
    var c = getStatusCounts(rows, STATUS_COLS);
    var tot = STATUS_COLS.length * rows.length;
    var pct = tot > 0 ? Math.round(c['Gereed']/tot*100) : 0;
    var pctColor = pct>=75?'var(--g-fg)':pct>=40?'var(--r-fg)':'var(--b-fg)';
    var pctBg    = pct>=75?'var(--g-bg)':pct>=40?'var(--r-bg)':'var(--b-bg)';
    html += '<tr>'
      + '<td>'+esc(eng)+'</td>'
      + '<td>'+rows.length+'</td>'
      + '<td style="color:var(--g-fg);font-weight:500">'+c['Gereed']+'</td>'
      + '<td style="color:var(--l-fg)">'+c['Loopt']+'</td>'
      + '<td style="color:var(--r-fg)">'+c['Review']+'</td>'
      + '<td style="color:var(--b-fg)">'+c['Geblokkeerd']+'</td>'
      + '<td><span class="pct-badge" style="background:'+pctBg+';color:'+pctColor+'">'+pct+'%</span></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('mainContent').innerHTML = html;
}

// ══ SIDEBAR ══
var _sbCollapsed = (localStorage.getItem('sb_collapsed') === '1');
function _sbApply() {
  var sb  = document.getElementById('appSidebar');
  var tog = document.getElementById('sbToggle');
  if (!sb) return;
  if (_sbCollapsed) {
    sb.classList.add('collapsed');
    document.body.classList.add('sidebar-collapsed-state');
    if (tog) { tog.innerHTML = '&#x276F;'; tog.title = 'Sidebar uitklappen'; }
  } else {
    sb.classList.remove('collapsed');
    document.body.classList.remove('sidebar-collapsed-state');
    if (tog) { tog.innerHTML = '&#x276E;'; tog.title = 'Sidebar inklappen'; }
  }
}
function toggleSidebar() {
  _sbCollapsed = !_sbCollapsed;
  localStorage.setItem('sb_collapsed', _sbCollapsed ? '1' : '0');
  _sbApply();
}
document.addEventListener('DOMContentLoaded', function() {
  _sbApply();
  document.body.classList.add('has-sidebar');
});

// ── Sidebar resize ──
function _initSidebarResize() {
  var sb = document.getElementById('appSidebar');
  var handle = sb ? sb.querySelector('.sidebar-resize-handle') : null;
  if (!handle || handle._initDone) return;
  handle._initDone = true;
  var startX, startW;
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startX = e.clientX;
    startW = parseInt(getComputedStyle(sb).width);
    sb.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(e) {
      var newW = Math.max(160, Math.min(380, startW + e.clientX - startX));
      document.documentElement.style.setProperty('--sb-w', newW + 'px');
      sb.style.width = newW + 'px';
      localStorage.setItem('sb_width', newW);
    }
    function onUp() {
      sb.classList.remove('resizing');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // Restore saved width
  var saved = localStorage.getItem('sb_width');
  if (saved) {
    var w = parseInt(saved);
    document.documentElement.style.setProperty('--sb-w', w + 'px');
    sb.style.width = w + 'px';
  }
}
document.addEventListener('DOMContentLoaded', _initSidebarResize);

</script>
