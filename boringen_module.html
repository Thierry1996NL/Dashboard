<style id="boringen-css">

/* ── BORINGEN MODAL OVERLAY ── */
.bor-overlay {
  position:fixed; inset:0; background:rgba(8,13,31,.55);
  z-index:800; display:flex; align-items:center; justify-content:center;
  padding:1rem; opacity:0; pointer-events:none; transition:opacity .15s;
}
.bor-overlay.open { opacity:1; pointer-events:all; }

.bor-modal {
  background:var(--surface); border-radius:var(--r-xl);
  width:100%; max-width:920px; max-height:92vh;
  display:flex; flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
  border:1px solid var(--border-md);
  transform:translateY(10px); transition:transform .18s cubic-bezier(.34,1.2,.64,1);
}
.bor-overlay.open .bor-modal { transform:translateY(0); }

/* Header */
.bor-modal-header {
  padding:.875rem 1.25rem .75rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:.75rem; flex-shrink:0;
}
.bor-modal-icon {
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg,#0f4c9e,var(--accent));
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.bor-modal-title { font-size:14px; font-weight:600; color:var(--text); }
.bor-modal-sub   { font-size:10px; color:var(--text-3); margin-top:1px; }
.bor-close {
  margin-left:auto; background:none; border:none; cursor:pointer;
  color:var(--text-3); font-size:15px; padding:4px 7px; border-radius:6px;
  transition:all .1s; line-height:1;
}
.bor-close:hover { background:var(--surface2); color:var(--text); }

/* Progress bar */
.bor-progress-row {
  padding:.5rem 1.25rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:.75rem; flex-shrink:0;
  background:var(--surface2);
}
.bor-progress-label { font-size:11px; color:var(--text-2); white-space:nowrap; }
.bor-progress-bar-wrap {
  flex:1; height:6px; background:var(--surface3);
  border-radius:3px; overflow:hidden;
}
.bor-progress-bar {
  height:100%; background:linear-gradient(90deg,var(--accent),#34C759);
  border-radius:3px; transition:width .3s ease;
}
.bor-progress-pct {
  font-size:11px; font-weight:600; font-variant-numeric:tabular-nums;
  color:var(--accent); white-space:nowrap;
}

/* Body — twee kolommen: lijst + form */
.bor-modal-body {
  display:flex; flex:1; overflow:hidden;
}

/* ── Lijst ── */
.bor-list-pane {
  width:320px; flex-shrink:0; border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.bor-list-head {
  padding:.625rem .875rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.07em; color:var(--text-3); flex-shrink:0;
}
.btn-bor-add {
  display:inline-flex; align-items:center; gap:3px;
  padding:4px 11px; font-size:11px; font-weight:600;
  border:none; border-radius:20px;
  background:var(--accent); color:#fff; cursor:pointer;
  transition:all .12s; font-family:'Inter',system-ui,-apple-system,sans-serif;
}
.btn-bor-add:hover { background:#0077ED; }
.btn-bor-add:disabled {
  background:var(--surface3); color:var(--text-3); cursor:not-allowed;
}

.bor-list { flex:1; overflow-y:auto; padding:5px 0; }
.bor-list::-webkit-scrollbar { width:4px; }
.bor-list::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:2px; }

.bor-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 10px; margin:2px 5px; border-radius:var(--r-md);
  cursor:pointer; border:1px solid transparent; transition:all .08s;
}
.bor-item:hover { background:var(--surface2); border-color:var(--border); }

.bor-item-nr {

/* ── Form pane ── */

.bor-field-grid {

}

.bor-field { display:flex; flex-direction:column; gap:3px; }
.bor-field.full { grid-column:1/-1; }
.bor-field-label {

.bor-input, .bor-select, .bor-textarea {

.bor-textarea { min-height:60px; resize:vertical; line-height:1.5; }
.bor-select {

.bor-checkbox-row {

/* ── Footer ── */

<script id="boringen-js">
// ══ BORINGEN STATE ══
var BOR_MAX     = 20;
var borRowIdx   = -1;    // huidig project row_idx
var borData     = [];    // array van boring-objecten uit DB
var borSelId    = null;  // geselecteerde boring id (null = nieuwe)
var borFormOpen = false;
var borStatus   = 'Nog te starten';

// ══ SUPABASE helpers (hergebruikt van bestaande variabelen) ══
// SUPA_URL en SUPA_KEY zijn al gedeclareerd in de bestaande code

function borGet(werkpakket_id) {
  return supaGet('/rest/v1/boringen?werkpakket_id=eq.' + werkpakket_id
    + '&order=boring_nr.asc&select=*');
}
function borInsert(obj) {
  return fetch(SUPA_URL + '/rest/v1/boringen', {
    method:'POST',
    headers:{
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type':'application/json', 'Prefer':'return=representation'
    },
    body: JSON.stringify(obj)
  }).then(function(r) { return r.json(); });
}
function borPatch(id, obj) {
  return fetch(SUPA_URL + '/rest/v1/boringen?id=eq.' + id, {
    method:'PATCH',
    headers:{
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type':'application/json', 'Prefer':'return=minimal'
    },
    body: JSON.stringify(obj)
  }).then(function(r) { return r.ok ? null : r.json().then(function(e){ throw new Error(e.message); }); });
}
function borDelete(id) {
  return fetch(SUPA_URL + '/rest/v1/boringen?id=eq.' + id, {
    method:'DELETE',
    headers:{
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY
    }
  }).then(function(r) { return r.ok ? null : Promise.reject(new Error('Delete mislukt')); });
}

// ══ OPEN / CLOSE ══
function openBorModal(werkpakket_id, projectnaam) {
  borRowIdx   = werkpakket_id;
  borSelId    = null;
  borFormOpen = false;
  document.getElementById('borModalTitle').textContent = 'Boringen — ' + (projectnaam || 'Project');
  document.getElementById('borModalSub').textContent   = 'Sleufloze technieken · max. ' + BOR_MAX + ' boringen';
  document.getElementById('borOverlay').classList.add('open');
  hideBorForm();
  loadBoringen();
}

function closeBorModal() {
  document.getElementById('borOverlay').classList.remove('open');
  borData = []; borRowIdx = -1; borSelId = null;
}

// ══ LOAD ══
function loadBoringen() {
  document.getElementById('borList').innerHTML =
    '<div class="bor-empty"><span class="bor-empty-icon">⌛</span>Laden...</div>';
  borGet(borRowIdx).then(function(data) {
    borData = data || [];
    renderBorList();
    updateBorProgress();
  }).catch(function(e) {
    document.getElementById('borList').innerHTML =
      '<div class="bor-empty">Laden mislukt: ' + esc(e.message) + '</div>';
  });
}

// ══ RENDER LIJST ══
function renderBorList() {
  var list = document.getElementById('borList');
  if (!borData.length) {
    list.innerHTML = '<div class="bor-empty"><span class="bor-empty-icon">⚡</span>Nog geen boringen.<br>Klik op Toevoegen.</div>';
    return;
  }
  var html = '';
  borData.forEach(function(b) {
    var bc = borBadgeCls(b.status);
    var dotColor = {G:'#2d7a4f',L:'#1a5fa8',R:'#8a5c0a',B:'#b53030',N:'#888'}[bc] || '#ccc';
    var meta = [b.type_boring, b.lengte_m ? b.lengte_m + ' m' : '', b.locatie]
      .filter(Boolean).join(' · ');
    var isActive = b.id === borSelId;
    html += '<div class="bor-item' + (isActive?' active':'') + '" onclick="selectBoring(' + b.id + ')">'
      + '<div class="bor-item-nr">' + esc(b.boring_nr || '?') + '</div>'
      + '<div class="bor-item-info">'
      +   '<div class="bor-item-name">' + esc(b.type_boring || 'Boring') + (b.locatie ? ' — ' + esc(b.locatie) : '') + '</div>'
      +   '<div class="bor-item-meta">' + esc(meta) + '</div>'
      + '</div>'
      + '<div class="bor-item-status"><span class="bor-status-dot" style="background:' + dotColor + '"></span></div>'
      + '</div>';
  });
  list.innerHTML = html;

  // Disable add button bij max
  var addBtn = document.getElementById('btnBorAdd');
  addBtn.disabled = borData.length >= BOR_MAX;
  addBtn.title    = borData.length >= BOR_MAX ? 'Maximum van ' + BOR_MAX + ' boringen bereikt' : '';
}

function updateBorProgress() {
  var n   = borData.length;
  var pct = Math.round(n / BOR_MAX * 100);
  document.getElementById('borProgressLabel').textContent = n + ' van ' + BOR_MAX + ' boringen';
  document.getElementById('borProgressBar').style.width   = pct + '%';
  document.getElementById('borProgressPct').textContent   = pct + '%';
  // Kleur bar rood bij bijna vol
  var bar = document.getElementById('borProgressBar');
  bar.style.background = pct >= 90
    ? 'linear-gradient(90deg,#ff6b35,#d70015)'
    : pct >= 60
      ? 'linear-gradient(90deg,#E8870C,#f5c542)'
      : 'linear-gradient(90deg,var(--accent),#34C759)';
}

// ══ SELECT / NEW ══
function selectBoring(id) {
  borSelId = id;
  var b = borData.find(function(x) { return x.id === id; });
  if (!b) return;
  fillBorForm(b);
  renderBorList(); // re-render voor active state
}

function newBoring() {
  if (borData.length >= BOR_MAX) {
    showToast('Maximum van ' + BOR_MAX + ' boringen bereikt', 'error');
    return;
  }
  borSelId = null;
  var nextNr = 'B-' + String(borData.length + 1).padStart(2, '0');
  fillBorForm({
    boring_nr:'', type_boring:'HDD', locatie:'',
    lengte_m:'', diameter_mm:'', diepte_m:'',
    aannemer:'', startdatum:'', einddatum:'',
    status:'Nog te starten',
    vergunning_nodig:false, vergunning_datum:'',
    opmerkingen:''
  });
  document.getElementById('bfNr').value = nextNr;
  renderBorList();
}

function fillBorForm(b) {
  document.getElementById('bfNr').value       = b.boring_nr        || '';
  document.getElementById('bfType').value     = b.type_boring      || 'HDD';
  document.getElementById('bfLocatie').value  = b.locatie          || '';
  document.getElementById('bfLengte').value   = b.lengte_m         != null ? b.lengte_m : '';
  document.getElementById('bfDiameter').value = b.diameter_mm      != null ? b.diameter_mm : '';
  document.getElementById('bfDiepte').value   = b.diepte_m         != null ? b.diepte_m : '';
  document.getElementById('bfAannemer').value = b.aannemer         || '';
  document.getElementById('bfStart').value    = b.startdatum       || '';
  document.getElementById('bfEind').value     = b.einddatum        || '';
  document.getElementById('bfVergNodig').checked = !!b.vergunning_nodig;
  document.getElementById('bfVergDatum').value   = b.vergunning_datum || '';
  document.getElementById('bfOpm').value      = b.opmerkingen      || '';
  borStatus = b.status || 'Nog te starten';
  toggleVergDatum();
  renderBorStatusBtns();
  showBorForm();
}

function showBorForm() {
  document.getElementById('borFormPlaceholder').style.display = 'none';
  document.getElementById('borForm').style.display            = '';
  document.getElementById('btnBorSave').style.display         = '';
  document.getElementById('btnBorDelete').style.display       = borSelId !== null ? '' : 'none';
}

function hideBorForm() {
  document.getElementById('borFormPlaceholder').style.display = '';
  document.getElementById('borForm').style.display            = 'none';
  document.getElementById('btnBorSave').style.display         = 'none';
  document.getElementById('btnBorDelete').style.display       = 'none';
}

// ══ STATUS ══
var BOR_STATUS_CLS = {
  'Nog te starten':'N', 'Loopt':'L', 'Review':'R', 'Gereed':'G', 'Geblokkeerd':'B'
};
function borBadgeCls(s) { return BOR_STATUS_CLS[s] || 'N'; }

function setBorStatus(btn) {
  borStatus = btn.getAttribute('data-status');
  renderBorStatusBtns();
}
function renderBorStatusBtns() {
  document.querySelectorAll('.bor-status-btn').forEach(function(btn) {
    var s  = btn.getAttribute('data-status');
    var bc = borBadgeCls(s);
    btn.className = 'bor-status-btn' + (s === borStatus ? ' active-' + bc : '');
  });
}

function toggleVergDatum() {
  var nodig = document.getElementById('bfVergNodig').checked;
  document.getElementById('bfVergDatumWrap').style.display = nodig ? '' : 'none';
}

// ══ SAVE ══
function saveBoring() {
  var nr = (document.getElementById('bfNr').value || '').trim();
  if (!nr) { showToast('✗ Boring nr. is verplicht', 'error'); document.getElementById('bfNr').focus(); return; }

  // Dubbel boring_nr check
  var dupCheck = borData.find(function(b) {
    return b.boring_nr === nr && b.id !== borSelId;
  });
  if (dupCheck) { showToast('✗ Boring nr. "' + nr + '" bestaat al', 'error'); return; }

  var payload = {
    werkpakket_id:    borRowIdx,
    boring_nr:        nr,
    type_boring:      document.getElementById('bfType').value     || 'HDD',
    locatie:          document.getElementById('bfLocatie').value   || null,
    lengte_m:         parseFloat(document.getElementById('bfLengte').value)   || null,
    diameter_mm:      parseInt(document.getElementById('bfDiameter').value)   || null,
    diepte_m:         parseFloat(document.getElementById('bfDiepte').value)   || null,
    aannemer:         document.getElementById('bfAannemer').value  || null,
    startdatum:       document.getElementById('bfStart').value     || null,
    einddatum:        document.getElementById('bfEind').value      || null,
    status:           borStatus,
    vergunning_nodig: document.getElementById('bfVergNodig').checked,
    vergunning_datum: document.getElementById('bfVergDatum').value || null,
    opmerkingen:      document.getElementById('bfOpm').value       || null,
    updated_by:       currentUser,
    updated_at:       new Date().toISOString()
  };

  document.getElementById('btnBorSave').disabled = true;
  showSaving(true);

  var promise;
  if (borSelId !== null) {
    // UPDATE
    promise = borPatch(borSelId, payload).then(function() {
      var idx = borData.findIndex(function(b) { return b.id === borSelId; });
      if (idx >= 0) borData[idx] = Object.assign(borData[idx], payload);
      showToast('✓ Boring opgeslagen', 'success');
    });
  } else {
    // INSERT
    payload.created_by = currentUser;
    payload.created_at = new Date().toISOString();
    promise = borInsert(payload).then(function(inserted) {
      var newBor = Array.isArray(inserted) ? inserted[0] : inserted;
      borData.push(newBor);
      borSelId = newBor.id;
      showToast('✓ Boring toegevoegd', 'success');
    });
  }

  promise.then(function() {
    showSaving(false);
    document.getElementById('btnBorSave').disabled = false;
    renderBorList();
    updateBorProgress();
    showBorForm(); // refresh delete button
    updateBorBadgeInTable(borRowIdx);
  }).catch(function(err) {
    showSaving(false);
    document.getElementById('btnBorSave').disabled = false;
    showToast('✗ Opslaan mislukt: ' + err.message, 'error');
  });
}

// ══ DELETE ══
function deleteBoring() {
  if (borSelId === null) return;
  var b = borData.find(function(x) { return x.id === borSelId; });
  var nr = b ? b.boring_nr : 'deze boring';
  if (!confirm('Weet je zeker dat je "' + nr + '" wilt verwijderen?')) return;
  showSaving(true);
  borDelete(borSelId).then(function() {
    borData = borData.filter(function(x) { return x.id !== borSelId; });
    borSelId = null;
    showSaving(false);
    showToast('✓ Boring verwijderd', 'success');
    renderBorList();
    updateBorProgress();
    hideBorForm();
    updateBorBadgeInTable(borRowIdx);
  }).catch(function(err) {
    showSaving(false);
    showToast('✗ Verwijderen mislukt: ' + err.message, 'error');
  });
}

// ══ BADGE UPDATER IN HOOFD-TABEL ══
// Bijwerkt de boring-badge in de tabel zonder volledige re-render
function updateBorBadgeInTable(werkpakket_id) {
  var badge = document.querySelector('[data-borpid="' + werkpakket_id + '"]');
  if (!badge) return;
  var n = borData.length;
  if (n > 0) {
    badge.className    = 'bor-badge';
    badge.textContent  = n === 1 ? '⚡ 1 boring' : '⚡ ' + n + ' boringen';
  } else {
    badge.className    = 'bor-badge-empty';
    badge.textContent  = '+ Boring toevoegen';
  }
}

// ══ RENDER HOOK: boringen badge in tabel ══
// Aanroepen vanuit de render() functie voor kolom 310
// Geef de cel terug als innerHTML
function renderBoringCell(werkpakket_id, count) {
  // count wordt meegegeven vanuit een cache; bij eerste load = null
  if (count === undefined || count === null) count = 0; // fallback
  var editorOnly = currentMode === 'editor';
  var onclick = 'event.stopPropagation();openBorModal(' + werkpakket_id + ',\'' + werkpakket_id + '\')';
  if (count > 0) {
    return '<span class="bor-badge" data-borpid="' + werkpakket_id + '" onclick="' + onclick + '">'
      + '⚡ ' + count + (count === 1 ? ' boring' : ' boringen') + '</span>';
  } else {
    return '<span class="bor-badge-empty" data-borpid="' + werkpakket_id + '" onclick="' + onclick + '">'
      + '+ Boring toevoegen</span>';
  }
}

// ══ CACHE: boringen counts per project ══
// Laden bij startup zodat de tabel direct een teller toont
var BOR_COUNTS = {}; // werkpakket_id -> count

function loadBoringCounts() {
  // Haal alle boring-id's en werkpakket_id's op (geen grote payloads)
  return supaGet('/rest/v1/boringen?select=id,werkpakket_id')
    .then(function(data) {
      BOR_COUNTS = {};
      (data || []).forEach(function(b) {
        BOR_COUNTS[b.werkpakket_id] = (BOR_COUNTS[b.werkpakket_id] || 0) + 1;
      });
    })
    .catch(function() {}); // non-fatal
}
